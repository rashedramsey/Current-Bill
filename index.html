<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building 9 Bill Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen">

    <div class="max-w-6xl mx-auto p-4 space-y-6">
        <header class="text-center py-8 bg-white rounded-3xl shadow-sm border border-slate-200">
            <h1 class="text-4xl font-black text-slate-800 tracking-tight">Building 9 <span class="text-blue-600">Bill Portal</span></h1>
            <p class="text-slate-500 mt-2 font-medium">Official DESCO Sub-Meter Management System</p>
        </header>

        <div class="flex justify-end gap-3">
            <button id="loginBtn" onclick="openModal()" class="bg-blue-600 text-white px-6 py-2.5 rounded-full font-bold shadow-lg shadow-blue-200 hover:scale-105 transition-transform">
                Admin Login
            </button>
            <button id="logoutBtn" onclick="logoutAdmin()" class="hidden bg-red-500 text-white px-6 py-2.5 rounded-full font-bold shadow-lg shadow-red-200 hover:scale-105 transition-transform">
                Logout Admin
            </button>
        </div>

        <section id="adminPanel" class="hidden bg-white p-8 rounded-3xl shadow-xl border-t-8 border-blue-600">
            <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                <span class="bg-blue-100 p-2 rounded-lg mr-3">📝</span> New Monthly Entry
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-sm font-bold text-slate-600 mb-2">Total Monthly Recharge (BDT)</label>
                    <input type="number" id="totalCash" class="form-input text-lg py-4 px-6 bg-slate-50 rounded-2xl w-full border-2 border-transparent focus:border-blue-500 outline-none transition-all" placeholder="Enter Total BDT Amount">
                </div>
                <div id="aptInputs" class="grid grid-cols-1 md:grid-cols-2 gap-6 col-span-2"></div>
            </div>
            <button onclick="calculateAndSave()" class="btn-primary w-full mt-10 py-5 bg-blue-600 text-white rounded-2xl text-xl font-black hover:bg-blue-700 shadow-xl transition-all">
                SAVE & GENERATE BILLS
            </button>
        </section>

        <section class="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200">
    <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center">
        <span class="bg-green-100 p-2 rounded-lg mr-3">📊</span> Billing History
    </h2>
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-[1000px]">
            <thead class="bg-slate-800 text-white text-[10px] uppercase tracking-widest font-bold">
                <tr>
                    <th class="p-4 border-b border-slate-700">Month</th>
                    <th class="p-4 border-b border-slate-700">Apt</th>
                    <th class="p-4 border-b border-slate-700 text-center">Prev Reading</th>
                    <th class="p-4 border-b border-slate-700 text-center">Curr Reading</th>
                    <th class="p-4 border-b border-slate-700 text-center">Units Used</th>
                    <th class="p-4 border-b border-slate-700 text-center">Rate (BDT)</th>
                    <th class="p-4 border-b border-slate-700 text-center bg-slate-700">Total Recharge</th>
                    <th class="p-4 border-b border-slate-700 text-center">Individual Bill</th>
                    <th id="adminHead" class="hidden p-4 border-b border-slate-700 text-center text-red-400">Action</th>
                </tr>
            </thead>
            <tbody id="historyBody" class="text-sm"></tbody>
        </table>
    </div>
</section>
    </div>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-content">
            <div class="text-center mb-8">
                <h3 class="text-2xl font-black text-slate-800">Admin Authentication</h3>
                <p class="text-slate-500 text-sm">Access Restricted to Building Owner</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold uppercase text-slate-400">User ID</label>
                    <input type="text" id="adminID" class="modal-input" placeholder="Enter ID">
                </div>
                <div>
                    <label class="text-xs font-bold uppercase text-slate-400">Password</label>
                    <input type="password" id="adminPass" class="modal-input" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-4 hover:bg-blue-700 transition-all">
                    Sign In
                </button>
                <button onclick="closeModal()" class="w-full text-slate-400 text-sm py-2 hover:text-slate-600">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
