<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Bill Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold text-blue-600 mb-6 text-center">DESCO Sub-Meter Bill Splitter</h1>
        
        <div id="admin-section" class="space-y-4">
            <h2 class="text-lg font-semibold border-b pb-2">Admin: Monthly Entry</h2>
            <div>
                <label class="block text-sm font-medium">Total Recharge Amount (BDT)</label>
                <input type="number" id="totalAmount" class="w-full p-2 border rounded" placeholder="e.g. 5000">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">9A Units</label>
                    <input type="number" class="unit-input w-full p-2 border rounded" data-apt="9A">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">9B Units</label>
                    <input type="number" class="unit-input w-full p-2 border rounded" data-apt="9B">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">9C Units</label>
                    <input type="number" class="unit-input w-full p-2 border rounded" data-apt="9C">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">9D Units</label>
                    <input type="number" class="unit-input w-full p-2 border rounded" data-apt="9D">
                </div>
            </div>
            <button onclick="calculateBill()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Calculate & Generate Report</button>
        </div>

        <hr class="my-8">

        <div id="report-section" class="hidden">
            <h2 class="text-lg font-semibold text-center mb-4">Bill Summary - <span id="currentDate"></span></h2>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="p-2 border">Apt</th>
                        <th class="p-2 border">Units</th>
                        <th class="p-2 border">Share %</th>
                        <th class="p-2 border">Amount (BDT)</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
            <div class="mt-4 p-4 bg-yellow-50 rounded border border-yellow-200 text-sm italic">
                Note: Total recharge is split proportionally based on unit consumption.
            </div>
            <button onclick="window.print()" class="mt-4 w-full bg-gray-500 text-white py-2 rounded">Download/Print PDF</button>
        </div>
    </div>

    <script>
        function calculateBill() {
            const totalCash = parseFloat(document.getElementById('totalAmount').value);
            const inputs = document.querySelectorAll('.unit-input');
            let totalUnits = 0;
            let data = [];

            // Calculate total units first
            inputs.forEach(input => {
                const val = parseFloat(input.value) || 0;
                totalUnits += val;
                data.push({ apt: input.dataset.apt, units: val });
            });

            if (totalUnits === 0 || isNaN(totalCash)) {
                alert("Please enter valid recharge amount and units.");
                return;
            }

            // Generate Table Rows
            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';
            
            data.forEach(item => {
                const percentage = (item.units / totalUnits) * 100;
                const individualBill = (item.units / totalUnits) * totalCash;

                tbody.innerHTML += `
                    <tr>
                        <td class="p-2 border font-bold">${item.apt}</td>
                        <td class="p-2 border">${item.units}</td>
                        <td class="p-2 border">${percentage.toFixed(1)}%</td>
                        <td class="p-2 border font-bold text-blue-700">${individualBill.toFixed(2)}</td>
                    </tr>
                `;
            });

            // Add Total Row
            tbody.innerHTML += `
                <tr class="bg-gray-100 font-bold">
                    <td class="p-2 border text-right" colspan="3">Total:</td>
                    <td class="p-2 border text-blue-700">${totalCash.toFixed(2)}</td>
                </tr>
            `;

            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
            document.getElementById('report-section').classList.remove('hidden');
        }
    </script>
</body>
</html>
